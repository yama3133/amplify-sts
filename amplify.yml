version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # シークレット管理にある OPENAI_API_KEY を安全にファイルへ書き出す
        - echo "OPENAI_API_KEY=${OPENAI_API_KEY}" > .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
